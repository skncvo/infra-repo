- hosts: k8s_master
  become: yes
  tasks:
    - name: Check API server readiness
      command: kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes
      register: kubectl_nodes_check
      changed_when: false

    - name: Install flannel CNI
      command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf
        apply -f https://github.com/flannel-io/flannel/releases/download/v0.28.1/kube-flannel.yml
      when: kubectl_nodes_check.rc == 0
      register: flannel_apply
      changed_when: "'created' in flannel_apply.stdout or 'configured' in flannel_apply.stdout"

    - name: Wait for flannel daemonset rollout
      command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf
        -n kube-flannel rollout status daemonset/kube-flannel-ds --timeout=180s
      changed_when: false
