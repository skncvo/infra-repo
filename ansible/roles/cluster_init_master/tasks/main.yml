- name: Check if Kubernetes master is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_admin_conf

# 🔥 추가: 실패 상태 cleanup
- name: Reset kubeadm if previous failed
  command: kubeadm reset -f
  when: not kubeadm_admin_conf.stat.exists
  ignore_errors: yes

- name: Remove etcd data dir
  file:
    path: /var/lib/etcd
    state: absent
  when: not kubeadm_admin_conf.stat.exists

- name: Remove kubernetes config dir
  file:
    path: /etc/kubernetes
    state: absent
  when: not kubeadm_admin_conf.stat.exists

- name: Initialize Kubernetes master
  shell: >
    kubeadm init
    --apiserver-advertise-address={{ kube_master_ip }}
    --pod-network-cidr={{ pod_network_cidr }}
    --node-name={{ node_hostname }}
  when: not kubeadm_admin_conf.stat.exists
  register: kubeadm_init_result

- name: Ensure .kube directory exists for ubuntu user
  file:
    path: /home/{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy admin.conf to user kube config
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/{{ ansible_user }}/.kube/config
    remote_src: yes
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0644'

- name: Generate kubeadm join command
  shell: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false

- name: Save join command to file on remote master
  copy:
    content: "{{ kubeadm_join_command.stdout }} --cri-socket unix:///run/containerd/containerd.sock\n"
    dest: /tmp/kubeadm_join_cmd.sh
    owner: root
    group: root
    mode: '0700'
