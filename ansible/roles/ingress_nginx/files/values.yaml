fullnameOverride: ingress-nginx

controller:
  replicaCount: 1

  ingressClassResource:
    name: nginx
    enabled: true
    default: true

  ingressClass: nginx

  service:
    type: NodePort
    nodePorts:
      http: 30000
      https: 30443

  config:
    use-forwarded-headers: "true"

  metrics:
    enabled: true

defaultBackend:
  enabled: true
